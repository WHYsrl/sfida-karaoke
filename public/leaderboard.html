<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classifica - Sfida Karaoke 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a1628 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    .screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 30px 60px;
    }

    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .title-bar h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b, #ffa500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .title-bar .event-info {
      color: #888;
      font-size: 1rem;
      text-align: right;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(233,69,96,0.2);
      border: 1px solid #e94560;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #e94560;
      margin-bottom: 4px;
    }
    .live-badge .dot {
      width: 8px;
      height: 8px;
      background: #e94560;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== VOTING STATUS BANNER ===== */
    .voting-banner {
      border-radius: 16px;
      padding: 16px 30px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 1.3rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.5s ease;
    }
    .voting-banner.open {
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
      border: 2px solid #22c55e;
      color: #22c55e;
      animation: glowGreen 2s ease-in-out infinite;
    }
    .voting-banner.closed {
      background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(239,68,68,0.04));
      border: 2px solid rgba(239,68,68,0.5);
      color: #ef4444;
    }
    @keyframes glowGreen {
      0%, 100% { box-shadow: 0 0 20px rgba(34,197,94,0.15); }
      50% { box-shadow: 0 0 40px rgba(34,197,94,0.3); }
    }

    .voting-banner .status-icon {
      font-size: 1.6rem;
    }
    .voting-banner .status-text {
      flex: 1;
      text-align: center;
    }

    /* Timer in banner */
    .timer-display {
      display: none;
      align-items: center;
      gap: 12px;
    }
    .timer-display.active {
      display: flex;
    }
    .timer-clock {
      font-size: 2.8rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      color: #ffa500;
      text-shadow: 0 0 20px rgba(255,165,0,0.4);
    }
    .timer-label {
      font-size: 0.7rem;
      color: #ffa500;
      letter-spacing: 1px;
      opacity: 0.8;
    }
    .timer-urgent .timer-clock {
      color: #ef4444;
      text-shadow: 0 0 30px rgba(239,68,68,0.5);
      animation: timerBlink 1s infinite;
    }
    @keyframes timerBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Leaderboard Table */
    .leaderboard {
      flex: 1;
      overflow: hidden;
    }
    .lb-header {
      display: grid;
      grid-template-columns: 60px 1fr 140px 140px 120px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px 12px 0 0;
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .lb-rows {
      overflow-y: auto;
      max-height: calc(100vh - 300px);
    }
    .lb-row {
      display: grid;
      grid-template-columns: 60px 1fr 140px 140px 120px;
      padding: 16px 20px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: all 0.5s ease;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .lb-row:nth-child(1) { background: rgba(255,215,0,0.08); }
    .lb-row:nth-child(2) { background: rgba(192,192,192,0.05); }
    .lb-row:nth-child(3) { background: rgba(205,127,50,0.05); }

    .lb-rank {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
    }
    .lb-row:nth-child(1) .lb-rank { color: #ffd700; }
    .lb-row:nth-child(2) .lb-rank { color: #c0c0c0; }
    .lb-row:nth-child(3) .lb-rank { color: #cd7f32; }

    .lb-name {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .lb-company {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }
    .lb-score {
      text-align: center;
      font-size: 1.1rem;
    }
    .lb-score .label {
      font-size: 0.7rem;
      color: #888;
      display: block;
    }
    .lb-total {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Waiting state */
    .waiting {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
    }
    .waiting .icon { font-size: 5rem; margin-bottom: 20px; }
    .waiting p { font-size: 1.3rem; }

    /* Footer */
    .footer {
      text-align: center;
      padding-top: 12px;
      color: #444;
      font-size: 0.8rem;
    }

    .hidden { display: none !important; }

    /* Scrollbar */
    .lb-rows::-webkit-scrollbar { width: 4px; }
    .lb-rows::-webkit-scrollbar-track { background: transparent; }
    .lb-rows::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="title-bar">
      <div>
        <h1>Classifica Live</h1>
      </div>
      <div class="event-info">
        <div class="live-badge"><span class="dot"></span> LIVE</div>
        <div>Sfida Karaoke 2026 &bull; Jackie'O</div>
      </div>
    </div>

    <!-- Voting status banner -->
    <div class="voting-banner closed" id="votingBanner">
      <span class="status-icon" id="statusIcon">&#x1F6D1;</span>
      <span class="status-text" id="statusText">VOTAZIONI CHIUSE</span>
      <div class="timer-display" id="timerArea">
        <div>
          <div class="timer-label">TEMPO RIMANENTE</div>
          <div class="timer-clock" id="timerClock">--:--</div>
        </div>
      </div>
    </div>

    <!-- Waiting state -->
    <div id="waiting" class="waiting">
      <div class="icon">🎤</div>
      <p>In attesa dei risultati...</p>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboard" class="leaderboard hidden">
      <div class="lb-header">
        <div>#</div>
        <div>Artista</div>
        <div style="text-align:center">Preparazione</div>
        <div style="text-align:center">Performance</div>
        <div style="text-align:center">Totale</div>
      </div>
      <div class="lb-rows" id="lbRows"></div>
    </div>

    <div class="footer">Our Films vs Frame by Frame &bull; 7 Maggio 2026</div>
  </div>

  <script>
    const API = '/api/vote';
    let currentTimerEnd = null;
    let timerInterval = null;

    async function fetchAll() {
      await Promise.all([fetchLeaderboard(), fetchProjectorStatus()]);
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch(`${API}/leaderboard`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.leaderboard && data.leaderboard.length > 0) {
          document.getElementById('waiting').classList.add('hidden');
          document.getElementById('leaderboard').classList.remove('hidden');
          renderLeaderboard(data.leaderboard);
        } else {
          document.getElementById('waiting').classList.remove('hidden');
          document.getElementById('leaderboard').classList.add('hidden');
        }
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }

    async function fetchProjectorStatus() {
      try {
        const res = await fetch(`${API}/projector-status`);
        if (!res.ok) return;
        const data = await res.json();
        updateVotingBanner(data);
      } catch (e) {
        console.error('Status fetch error:', e);
      }
    }

    function updateVotingBanner(data) {
      const banner = document.getElementById('votingBanner');
      const icon = document.getElementById('statusIcon');
      const text = document.getElementById('statusText');
      const timerArea = document.getElementById('timerArea');

      if (data.voting_open) {
        banner.className = 'voting-banner open';
        icon.innerHTML = '&#9989;';
        text.textContent = `VOTAZIONI APERTE`;
      } else {
        banner.className = 'voting-banner closed';
        icon.innerHTML = '&#x1F6D1;';
        text.textContent = 'VOTAZIONI CHIUSE';
      }

      // Timer
      if (data.timer_ends_at && data.voting_open) {
        const endTime = new Date(data.timer_ends_at).getTime();
        if (endTime > Date.now()) {
          currentTimerEnd = endTime;
          timerArea.classList.add('active');
          if (!timerInterval) {
            timerInterval = setInterval(updateTimer, 500);
          }
          updateTimer();
        } else {
          clearTimerUI();
        }
      } else {
        clearTimerUI();
      }
    }

    function updateTimer() {
      if (!currentTimerEnd) return;
      const remaining = Math.max(0, currentTimerEnd - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      const clock = document.getElementById('timerClock');
      clock.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

      // Urgent mode under 60 seconds
      const timerArea = document.getElementById('timerArea');
      if (remaining <= 60000 && remaining > 0) {
        timerArea.classList.add('timer-urgent');
      } else {
        timerArea.classList.remove('timer-urgent');
      }

      if (remaining <= 0) {
        clearTimerUI();
      }
    }

    function clearTimerUI() {
      currentTimerEnd = null;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      document.getElementById('timerArea').classList.remove('active', 'timer-urgent');
      document.getElementById('timerClock').textContent = '--:--';
    }

    function renderLeaderboard(data) {
      const container = document.getElementById('lbRows');
      container.innerHTML = data.map((item, i) => `
        <div class="lb-row">
          <div class="lb-rank">${i + 1}</div>
          <div>
            <div class="lb-name">${escHtml(item.name)}</div>
            <div class="lb-company">${escHtml(item.company)} &bull; ${item.type === 'solista' ? 'Solista' : 'Gruppo'}</div>
          </div>
          <div class="lb-score">
            <span class="label">PREP</span>
            ${item.avg_preparation !== null ? item.avg_preparation.toFixed(1) : '-'}
          </div>
          <div class="lb-score">
            <span class="label">PERF</span>
            ${item.avg_performance !== null ? item.avg_performance.toFixed(1) : '-'}
          </div>
          <div class="lb-total">
            ${item.total_avg !== null ? item.total_avg.toFixed(1) : '-'}
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Initial fetch and auto-refresh every 5 seconds
    fetchAll();
    setInterval(fetchAll, 5000);
  </script>
</body>
</html>
