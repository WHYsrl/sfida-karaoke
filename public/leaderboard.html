<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classifica - Sfida Karaoke 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a1628 100%);
      min-height: 100vh; color: #fff; overflow: hidden;
    }
    .screen { height: 100vh; display: flex; flex-direction: column; }

    /* ===== NAVBAR ===== */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px; flex-shrink: 0;
      background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .navbar h1 {
      font-size: 1.6rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b, #ffa500);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .navbar-center {
      display: flex; align-items: center; gap: 16px;
    }
    .navbar-right {
      display: flex; align-items: center; gap: 14px;
    }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(233,69,96,0.2); border: 1px solid #e94560;
      border-radius: 20px; padding: 5px 12px; font-size: 0.8rem; color: #e94560;
    }
    .live-dot { width:7px;height:7px;background:#e94560;border-radius:50%;animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Timer in navbar */
    .nav-timer { display: none; align-items: center; gap: 10px; }
    .nav-timer.active { display: flex; }
    .nav-timer .t-label { font-size:0.55rem; text-transform:uppercase; letter-spacing:1.5px; color:#ffa500; }
    .nav-timer .t-clock {
      font-size: 1.8rem; font-weight: 800; font-variant-numeric: tabular-nums;
      letter-spacing: 2px; color: #ffa500; text-shadow: 0 0 15px rgba(255,165,0,0.3); line-height:1;
    }
    .nav-timer.urgent .t-clock { color:#ef4444; text-shadow:0 0 20px rgba(239,68,68,0.5); animation:blink 0.8s infinite; }
    .nav-timer.urgent .t-label { color:#ef4444; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .voter-count {
      font-size: 0.8rem; color: #888;
      display: flex; align-items: center; gap: 5px;
    }
    .voter-count strong { color: #e94560; font-size: 1rem; }

    /* ===== MAIN CONTENT ===== */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 20px 40px; }

    /* ===== VOTING OPEN SECTION ===== */
    .voting-section {
      flex-shrink: 0; margin-bottom: 16px; display: none;
    }
    .voting-section.active { display: block; }
    .voting-header {
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .voting-header .vh-dot { width:10px;height:10px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite; }
    .voting-header .vh-label { color: #22c55e; }

    .voting-list { display: flex; flex-direction: column; gap: 10px; }
    .voting-item {
      display: flex; align-items: center; gap: 18px;
      padding: 14px 22px; border-radius: 14px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    /* Company colors */
    .voting-item.ourfilms {
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.25);
    }
    .voting-item.framebyframe {
      background: rgba(233,69,96,0.06); border: 2px solid rgba(233,69,96,0.35);
    }
    .vi-logo { height: 36px; width: auto; border-radius: 5px; flex-shrink: 0; }
    .vi-info { flex: 1; }
    .vi-name { font-size: 1.5rem; font-weight: 700; }
    .vi-members { font-size: 0.85rem; color: #aaa; margin-top: 2px; }
    .vi-song {
      font-size: 1rem; color: #ccc; font-style: italic; margin-top: 4px;
    }
    .vi-song .artist { color: #888; font-style: normal; }
    .vi-badge {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 6px 14px; border-radius: 20px; flex-shrink: 0;
    }
    .voting-item.ourfilms .vi-badge { background: rgba(255,255,255,0.12); color: #fff; }
    .voting-item.framebyframe .vi-badge { background: rgba(233,69,96,0.2); color: #e94560; }

    /* Closed state */
    .closed-banner {
      flex-shrink: 0; margin-bottom: 16px; display: none;
      padding: 12px 24px; border-radius: 10px;
      background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.25);
      text-align: center; font-size: 0.9rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px; color: #ef4444;
    }
    .closed-banner.active { display: block; }

    /* ===== LEADERBOARD ===== */
    .leaderboard { flex: 1; overflow: hidden; }
    .lb-header {
      display: grid; grid-template-columns: 55px 44px 1fr 120px 120px 100px;
      padding: 9px 18px; background: rgba(255,255,255,0.04);
      border-radius: 10px 10px 0 0; font-size: 0.72rem; color: #666;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .lb-rows { overflow-y: auto; max-height: calc(100vh - 220px); }
    .lb-row {
      display: grid; grid-template-columns: 55px 44px 1fr 120px 120px 100px;
      padding: 12px 18px; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04); transition: all 0.4s;
    }
    .lb-row:nth-child(1) { background: rgba(255,215,0,0.07); }
    .lb-row:nth-child(2) { background: rgba(192,192,192,0.04); }
    .lb-row:nth-child(3) { background: rgba(205,127,50,0.04); }
    .lb-rank { font-size:1.2rem; font-weight:700; text-align:center; color:#555; }
    .lb-row:nth-child(1) .lb-rank { color:#ffd700; }
    .lb-row:nth-child(2) .lb-rank { color:#c0c0c0; }
    .lb-row:nth-child(3) .lb-rank { color:#cd7f32; }
    .lb-logo { text-align:center; }
    .lb-logo img { height:26px; width:auto; border-radius:3px; }
    .lb-name-col { padding-left: 8px; }
    .lb-name { font-size:1.05rem; font-weight:600; }
    .lb-sub { font-size:0.68rem; color:#666; margin-top:1px; }
    .lb-score { text-align:center; font-size:1rem; }
    .lb-score .label { font-size:0.6rem; color:#666; display:block; }
    .lb-media {
      text-align:center; font-size:1.3rem; font-weight:700;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    /* Waiting */
    .waiting { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#555; }
    .waiting .icon { font-size:4rem; margin-bottom:16px; }
    .waiting p { font-size:1.1rem; }

    .hidden { display:none !important; }
    .lb-rows::-webkit-scrollbar { width:3px; }
    .lb-rows::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
  </style>
</head>
<body>
  <div class="screen">
    <!-- NAVBAR -->
    <nav class="navbar">
      <h1>Sfida Karaoke 2026</h1>
      <div class="navbar-center">
        <div class="nav-timer" id="timerArea">
          <div>
            <div class="t-label">Tempo rimanente</div>
            <div class="t-clock" id="timerClock">--:--</div>
          </div>
        </div>
      </div>
      <div class="navbar-right">
        <div class="voter-count" id="voterCount"></div>
        <div class="live-badge"><span class="live-dot"></span> LIVE</div>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="main">
      <!-- Closed banner -->
      <div class="closed-banner" id="closedBanner">Votazioni chiuse</div>

      <!-- Voting open section -->
      <div class="voting-section" id="votingSection">
        <div class="voting-header">
          <span class="vh-dot"></span>
          <span class="vh-label" id="votingLabel">VOTA ORA</span>
        </div>
        <div class="voting-list" id="votingList"></div>
      </div>

      <!-- Waiting -->
      <div id="waiting" class="waiting">
        <div class="icon">🎤</div>
        <p>In attesa dei risultati...</p>
      </div>

      <!-- Leaderboard -->
      <div id="leaderboard" class="leaderboard hidden">
        <div class="lb-header">
          <div>#</div>
          <div></div>
          <div>Artista</div>
          <div style="text-align:center">Preparazione</div>
          <div style="text-align:center">Performance</div>
          <div style="text-align:center">Media</div>
        </div>
        <div class="lb-rows" id="lbRows"></div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/vote';
    let currentTimerEnd = null;
    let timerTick = null;

    function logo(c) { return c === 'ourfilms' ? '/img/ourfilms.png' : '/img/framebyframe.png'; }
    function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

    async function fetchAll() {
      try {
        const res = await fetch(`${API}/projector-data`);
        if (!res.ok) return;
        const d = await res.json();
        updateVotingSection(d);
        updateTimer(d);
        updateLeaderboard(d);
        updateVoterCount(d);
      } catch (e) { console.error(e); }
    }

    function updateVoterCount(d) {
      const el = document.getElementById('voterCount');
      if (d.total_voters > 0) {
        el.innerHTML = `<strong>${d.total_voters}</strong> votanti`;
      } else {
        el.innerHTML = '';
      }
    }

    function updateVotingSection(d) {
      const section = document.getElementById('votingSection');
      const closed = document.getElementById('closedBanner');
      const list = document.getElementById('votingList');
      const label = document.getElementById('votingLabel');

      if (d.voting_open && d.open_performers.length > 0) {
        section.classList.add('active');
        closed.classList.remove('active');
        label.textContent = d.open_performers.length === 1 ? 'VOTA ORA' : 'VOTAZIONI APERTE';

        list.innerHTML = d.open_performers.map(p => {
          const cls = p.company;
          const membersHtml = p.members && p.members.length
            ? `<div class="vi-members">👥 ${p.members.map(m => esc(m)).join(', ')}</div>` : '';
          const songHtml = p.song
            ? `<div class="vi-song">"${esc(p.song)}"${p.song_artist ? ` <span class="artist">— ${esc(p.song_artist)}</span>` : ''}</div>` : '';
          const badgeText = p.company === 'ourfilms' ? 'Our Films' : 'Frame by Frame';
          return `
            <div class="voting-item ${cls}">
              <img class="vi-logo" src="${logo(p.company)}" alt="">
              <div class="vi-info">
                <div class="vi-name">${esc(p.name)}</div>
                ${membersHtml}
                ${songHtml}
              </div>
              <div class="vi-badge">${badgeText}</div>
            </div>`;
        }).join('');
      } else {
        section.classList.remove('active');
        closed.classList.add('active');
      }
    }

    function updateTimer(d) {
      const ta = document.getElementById('timerArea');
      if (d.timer_ends_at && d.voting_open) {
        const endTime = new Date(d.timer_ends_at).getTime();
        if (endTime > Date.now()) {
          currentTimerEnd = endTime;
          ta.classList.add('active');
          startTick(); tickTimer(); return;
        }
      }
      currentTimerEnd = null; stopTick();
      ta.classList.remove('active','urgent');
    }

    function startTick() { if (!timerTick) timerTick = setInterval(tickTimer, 500); }
    function stopTick() { if (timerTick) { clearInterval(timerTick); timerTick = null; } }
    function tickTimer() {
      if (!currentTimerEnd) return;
      const rem = Math.max(0, currentTimerEnd - Date.now());
      const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
      document.getElementById('timerClock').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const ta = document.getElementById('timerArea');
      if (rem <= 60000 && rem > 0) ta.classList.add('urgent'); else ta.classList.remove('urgent');
      if (rem <= 0) { currentTimerEnd=null; stopTick(); ta.classList.remove('active','urgent'); }
    }

    function updateLeaderboard(d) {
      const results = d.results || [];
      if (d.show_results && results.length > 0) {
        document.getElementById('waiting').classList.add('hidden');
        document.getElementById('leaderboard').classList.remove('hidden');
        renderLB(results);
      } else {
        if (!d.voting_open) {
          document.getElementById('waiting').classList.remove('hidden');
        } else {
          document.getElementById('waiting').classList.add('hidden');
        }
        document.getElementById('leaderboard').classList.add('hidden');
      }
    }

    function renderLB(data) {
      document.getElementById('lbRows').innerHTML = data.map((r, i) => `
        <div class="lb-row">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-logo"><img src="${logo(r.company)}" alt=""></div>
          <div class="lb-name-col">
            <div class="lb-name">${esc(r.name)}</div>
            <div class="lb-sub">${r.type==='solista'?'Solista':'Gruppo'} &bull; ${r.vote_count} voti</div>
          </div>
          <div class="lb-score">
            <span class="label">PREP</span>
            ${r.avg_preparation != null ? r.avg_preparation.toFixed(1) : '-'}
          </div>
          <div class="lb-score">
            <span class="label">PERF</span>
            ${r.avg_performance != null ? r.avg_performance.toFixed(1) : '-'}
          </div>
          <div class="lb-media">
            ${r.media != null ? r.media.toFixed(1) : '-'}
          </div>
        </div>
      `).join('');
    }

    fetchAll();
    setInterval(fetchAll, 3000);
  </script>
</body>
</html>
