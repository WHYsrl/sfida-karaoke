<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classifica - Sfida Karaoke 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a1628 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    .screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 30px 50px;
    }

    /* HEADER */
    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .title-bar h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b, #ffa500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .title-bar .event-info {
      color: #888;
      font-size: 1rem;
      text-align: right;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(233,69,96,0.2);
      border: 1px solid #e94560;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #e94560;
      margin-bottom: 4px;
    }
    .live-dot {
      width: 8px; height: 8px;
      background: #e94560;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== VOTING STATUS STRIP ===== */
    .voting-strip {
      flex-shrink: 0;
      border-radius: 14px;
      padding: 18px 28px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 24px;
      transition: all 0.4s ease;
      min-height: 70px;
    }

    /* CLOSED state */
    .voting-strip.closed {
      background: rgba(239,68,68,0.08);
      border: 2px solid rgba(239,68,68,0.4);
    }
    .voting-strip.closed .strip-status {
      color: #ef4444;
    }

    /* OPEN state */
    .voting-strip.open {
      background: rgba(34,197,94,0.08);
      border: 2px solid rgba(34,197,94,0.6);
      animation: glowGreen 2.5s ease-in-out infinite;
    }
    .voting-strip.open .strip-status {
      color: #22c55e;
    }
    @keyframes glowGreen {
      0%, 100% { box-shadow: 0 0 15px rgba(34,197,94,0.1); }
      50% { box-shadow: 0 0 35px rgba(34,197,94,0.25); }
    }

    .strip-status {
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .strip-status .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .voting-strip.open .status-dot {
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }
    .voting-strip.closed .status-dot {
      background: #ef4444;
    }

    /* Performers currently voting */
    .strip-performers {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }
    .performer-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 8px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .performer-pill .pill-company {
      font-size: 0.65rem;
      color: #888;
      font-weight: 400;
      text-transform: uppercase;
    }
    .performer-pill .pill-song {
      font-size: 0.75rem;
      color: #ccc;
      font-weight: 400;
      font-style: italic;
    }

    /* Timer */
    .strip-timer {
      display: none;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-left: 20px;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    .strip-timer.active {
      display: flex;
    }
    .timer-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ffa500;
      margin-bottom: 2px;
    }
    .timer-clock {
      font-size: 2.6rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 3px;
      color: #ffa500;
      text-shadow: 0 0 20px rgba(255,165,0,0.35);
      line-height: 1;
    }

    /* Timer urgent (< 60s) */
    .strip-timer.urgent .timer-clock {
      color: #ef4444;
      text-shadow: 0 0 30px rgba(239,68,68,0.5);
      animation: blink 0.8s infinite;
    }
    .strip-timer.urgent .timer-label {
      color: #ef4444;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== LEADERBOARD ===== */
    .leaderboard { flex: 1; overflow: hidden; }
    .lb-header {
      display: grid;
      grid-template-columns: 60px 1fr 140px 140px 120px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px 12px 0 0;
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .lb-rows {
      overflow-y: auto;
      max-height: calc(100vh - 310px);
    }
    .lb-row {
      display: grid;
      grid-template-columns: 60px 1fr 140px 140px 120px;
      padding: 14px 20px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: all 0.5s ease;
    }
    .lb-row:nth-child(1) { background: rgba(255,215,0,0.08); }
    .lb-row:nth-child(2) { background: rgba(192,192,192,0.05); }
    .lb-row:nth-child(3) { background: rgba(205,127,50,0.05); }
    .lb-rank { font-size: 1.4rem; font-weight: 700; text-align: center; }
    .lb-row:nth-child(1) .lb-rank { color: #ffd700; }
    .lb-row:nth-child(2) .lb-rank { color: #c0c0c0; }
    .lb-row:nth-child(3) .lb-rank { color: #cd7f32; }
    .lb-name { font-size: 1.15rem; font-weight: 600; }
    .lb-company { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .lb-score { text-align: center; font-size: 1.05rem; }
    .lb-score .label { font-size: 0.65rem; color: #888; display: block; }
    .lb-total {
      text-align: center; font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Waiting */
    .waiting {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #666;
    }
    .waiting .icon { font-size: 5rem; margin-bottom: 20px; }
    .waiting p { font-size: 1.3rem; }

    .footer {
      text-align: center; padding-top: 10px; color: #444; font-size: 0.75rem;
      flex-shrink: 0;
    }

    .hidden { display: none !important; }
    .lb-rows::-webkit-scrollbar { width: 4px; }
    .lb-rows::-webkit-scrollbar-track { background: transparent; }
    .lb-rows::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="title-bar">
      <div><h1>Classifica Live</h1></div>
      <div class="event-info">
        <div class="live-badge"><span class="live-dot"></span> LIVE</div>
        <div>Sfida Karaoke 2026 &bull; Jackie'O</div>
      </div>
    </div>

    <!-- Voting status strip -->
    <div class="voting-strip closed" id="votingStrip">
      <div class="strip-status">
        <span class="status-dot"></span>
        <span id="statusLabel">VOTAZIONI CHIUSE</span>
      </div>
      <div class="strip-performers" id="openPerformers"></div>
      <div class="strip-timer" id="timerArea">
        <div class="timer-label">TEMPO RIMANENTE</div>
        <div class="timer-clock" id="timerClock">--:--</div>
      </div>
    </div>

    <!-- Waiting -->
    <div id="waiting" class="waiting">
      <div class="icon">🎤</div>
      <p>In attesa dei risultati...</p>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboard" class="leaderboard hidden">
      <div class="lb-header">
        <div>#</div>
        <div>Artista</div>
        <div style="text-align:center">Preparazione</div>
        <div style="text-align:center">Performance</div>
        <div style="text-align:center">Totale</div>
      </div>
      <div class="lb-rows" id="lbRows"></div>
    </div>

    <div class="footer">Our Films vs Frame by Frame &bull; 7 Maggio 2026</div>
  </div>

  <script>
    const API = '/api/vote';
    let currentTimerEnd = null;
    let timerTick = null;

    async function fetchAll() {
      await Promise.all([fetchLeaderboard(), fetchProjectorStatus()]);
    }

    async function fetchProjectorStatus() {
      try {
        const res = await fetch(`${API}/projector-status`);
        if (!res.ok) return;
        const data = await res.json();
        updateStrip(data);
      } catch (e) {
        console.error('Status error:', e);
      }
    }

    function updateStrip(data) {
      const strip = document.getElementById('votingStrip');
      const label = document.getElementById('statusLabel');
      const perfArea = document.getElementById('openPerformers');
      const timerArea = document.getElementById('timerArea');

      if (data.voting_open && data.open_performers && data.open_performers.length > 0) {
        // === OPEN ===
        strip.className = 'voting-strip open';
        label.textContent = data.open_performers.length === 1 ? 'VOTA ORA' : 'VOTAZIONI APERTE';

        perfArea.innerHTML = data.open_performers.map(p =>
          `<div class="performer-pill">
            ${esc(p.name)}
            <span class="pill-company">${p.company === 'ourfilms' ? 'OF' : 'FBF'}</span>
            ${p.song ? `<span class="pill-song">"${esc(p.song)}"</span>` : ''}
          </div>`
        ).join('');
      } else {
        // === CLOSED ===
        strip.className = 'voting-strip closed';
        label.textContent = 'VOTAZIONI CHIUSE';
        perfArea.innerHTML = '';
      }

      // Timer
      if (data.timer_ends_at && data.voting_open) {
        const endTime = new Date(data.timer_ends_at).getTime();
        if (endTime > Date.now()) {
          currentTimerEnd = endTime;
          timerArea.classList.add('active');
          startTick();
          tickTimer();
          return;
        }
      }
      // No active timer
      currentTimerEnd = null;
      stopTick();
      timerArea.classList.remove('active', 'urgent');
    }

    function startTick() {
      if (!timerTick) timerTick = setInterval(tickTimer, 500);
    }
    function stopTick() {
      if (timerTick) { clearInterval(timerTick); timerTick = null; }
    }

    function tickTimer() {
      if (!currentTimerEnd) return;
      const remaining = Math.max(0, currentTimerEnd - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      document.getElementById('timerClock').textContent =
        `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

      const timerArea = document.getElementById('timerArea');
      if (remaining <= 60000 && remaining > 0) {
        timerArea.classList.add('urgent');
      } else {
        timerArea.classList.remove('urgent');
      }
      if (remaining <= 0) {
        currentTimerEnd = null;
        stopTick();
        timerArea.classList.remove('active', 'urgent');
      }
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch(`${API}/leaderboard`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.leaderboard && data.leaderboard.length > 0) {
          document.getElementById('waiting').classList.add('hidden');
          document.getElementById('leaderboard').classList.remove('hidden');
          renderLeaderboard(data.leaderboard);
        } else {
          document.getElementById('waiting').classList.remove('hidden');
          document.getElementById('leaderboard').classList.add('hidden');
        }
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }

    function renderLeaderboard(data) {
      document.getElementById('lbRows').innerHTML = data.map((item, i) => `
        <div class="lb-row">
          <div class="lb-rank">${i + 1}</div>
          <div>
            <div class="lb-name">${esc(item.name)}</div>
            <div class="lb-company">${esc(item.company)} &bull; ${item.type === 'solista' ? 'Solista' : 'Gruppo'}</div>
          </div>
          <div class="lb-score">
            <span class="label">PREP</span>
            ${item.avg_preparation !== null ? item.avg_preparation.toFixed(1) : '-'}
          </div>
          <div class="lb-score">
            <span class="label">PERF</span>
            ${item.avg_performance !== null ? item.avg_performance.toFixed(1) : '-'}
          </div>
          <div class="lb-total">
            ${item.total_avg !== null ? item.total_avg.toFixed(1) : '-'}
          </div>
        </div>
      `).join('');
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    fetchAll();
    setInterval(fetchAll, 3000);
  </script>
</body>
</html>
