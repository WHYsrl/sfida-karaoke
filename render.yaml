services:
  - type: web
    name: sfida-karaoke
    runtime: node
    buildCommand: npm install && npm run db:init && node src/migrate-v2.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sfida-karaoke-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: sfida-karaoke-db
    plan: free
    databaseName: sfida_karaoke
